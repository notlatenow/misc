<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Scroller</title>
    <style>
        /* 1. RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 700vh; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            
            background-image: linear-gradient(
                to bottom,
                #EDFFFE 0%,   
                #FFE566 15%,  
                #FF6026 25%,  
                #730823 31%,  
                #301934 35%,  
                #0E1F54 40%,  
                #000000 50%,  
                #301934 55%,  
                #730823 60%,  
                #FF8C00 70%,  
                #EDFFFE 85%,  
                #0052D4 100%  
            );
            
            background-repeat: no-repeat;
            background-attachment: scroll;
        }

        /* --- SIDE MENU STYLES --- */
        .side-menu {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            background-color: rgba(0, 0, 0, 0.25); 
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            z-index: 1000;
        }

        .side-menu a {
            text-decoration: none;
            font-size: 1.5rem;
            transition: transform 0.2s ease;
            /* Added the text shadow from before */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .side-menu a:hover {
            transform: scale(1.2);
        }

        /* 2. SECTION LAYOUT */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* This keeps the box centered vertically */
            align-items: center;    /* This keeps the box centered horizontally */
            padding: 20px;
            text-align: center;
        }

        .spacer {
            height: 60vh; 
        }

        /* 3. TEXT STYLING */
        .container {
            max-width: 600px;
            background: rgba(0, 0, 0, 0.2); 
            padding: 2.5rem;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -2px;
        }

        p {
            font-size: 1.15rem;
            line-height: 1.6;
            opacity: 0.9;
            font-weight: 300;
        }

        .light-bg-text {
            color: #1a1a1a;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        #top h1,
	#top p {
            color: #E6B600;
            opacity: 1;
        }


	#dusk h1,
	#dusk p {
            color: #FCA400;
            opacity: 1;
        }

	#night h1,
	#night p {
            color: #FFF;
            opacity: 1;
        }

	#dawn h1,
	#dawn p {
            color: #C95700;
            opacity: 1;
        }

	#day h1, 
        #day p {
            color: #007CC9;
            opacity: 1;
        }

    </style>
</head>
<body>

    <nav class="side-menu">
        <a href="#top">🌬️</a>
        <a href="#dusk">🌙</a>
        <a href="#night">⭐</a>
        <a href="#dawn">☀️</a>
        <a href="#day">☁️</a>
    </nav>

    <section id="top">
        <div class="container light-bg-text">
            <h1>歡迎</h1>
            <p>Use the side icons to scroll between the seasons of the sky~</p>
        </div>
    </section>

    <div class="spacer"></div>

    <section id="dusk">
        <div class="container">
            <h1>傍晚</h1>
            <p>Catching fire before the cooling shadows of dusk</p>
        </div>
    </section>

    <div class="spacer"></div>

    <section id="night">
        <div class="container">
            <h1>晚上</h1>
            <p>Dipping into darkness, an inky sky emerges</p>
        </div>
    </section>

    <div class="spacer"></div>

    <section id="dawn">
        <div class="container light-bg-text">
            <h1>清晨</h1>
            <p>Dawn streaks across with bright orange ruptures</p>
        </div>
    </section>

    <div class="spacer"></div>

    <section id="day">
        <div class="container light-bg-text">
            <h1>中午</h1>
            <p>The cycle continues under the bright, midday sky</p>
        </div>
    </section>

    <div style="height: 15vh;"></div>

</body>
</html>
